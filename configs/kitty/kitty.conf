# KITTY CONFIG - DYNAMIC GOLD GRADIENT EDITION

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0
force_ltr no

background_opacity 0.65
background #050505
foreground #FFD700

selection_background #B8860B
selection_foreground #000000

cursor #FFFFFF
cursor_text_color #000000
cursor_shape beam
cursor_beam_thickness 2

window_padding_width 20

# Color Scheme: Diverse Metallic & Gradient Tones
# Black (Dark Onyx)
color0 #000000
color8 #1a1a1a

# Red (Subtle Maroon/Bronze)
color1 #800000
color9 #CD5C5C

# Green (Warm Brass)
color2 #8B814C
color10 #BDB76B

# Yellow (Primary Golds)
